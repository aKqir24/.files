icons_format = "<span font_family='EnvyCodeR Nerd' size='12pt'>{icon}</span>"

[theme.overrides]
idle_bg = "#12162b"
idle_fg = "#c3c4ca"
info_bg = "#c3c4ca"
info_fg = "#12162b"
good_bg = "#58A2A5"
good_fg = "#12162b"
warning_bg = "#6BBDBA"
warning_fg = "#12162b"
critical_bg = "#589EA3"
critical_fg = "#12162b"
alternating_tint_bg = "#12162b"
alternating_tint_fg = "#12162b"
separator = "<span size='16pt'> </span>"
separator_bg = "auto"
separator_fg = "auto"

[icons]
icons = "none"

[icons.overrides]
cpu = "  "
cpu_boost_on = ""
cpu_boost_off = ""
memory_mem = "  "
memory_swap = " 󰋊 "
volume = ["󰕿", "󰖀", "󰕾"]
volume_muted = " 󰝟"
microphone = ["", "", ""]
microphone_muted = ""
headphones = ""
webcam = ""
net_wired = " 󰱓"
net_loopback = ""
net_modem = ""

[[block]]
block = "cpu"
interval = 2
info_cpu = 20
warning_cpu = 50
critical_cpu = 90
format = " $icon $utilization "

[[block.click]]
button = "right"
cmd = "alacritty -e btop"

[[block]]
block = "memory"
format = "  $icon $mem_used_percents.eng(w:1) "
format_alt = "  $icon_swap $swap_used_percents.eng(w:2) "

[[block]]
block = "custom"
interval = 0.5
command = "sh ~/.config/i3/status/custom_status.sh --type=bluetooth"

[[block.click]]
button = "left"
cmd = "sh ~/.config/i3/status/custom_status.sh --type=bluetooth toggle"

[[block.click]]
button = "right"
cmd = "bash ~/.config/rofi/scripts/bluetooth.sh"

[[block]]
block = "custom"
interval = 2
command = "sh ~/.config/i3/status/custom_status.sh --type=wifi"

[[block.click]]
button = "right"
cmd = "bash ~/.config/rofi/scripts/wifi.sh"

[[block]]
block = "net"
interval = 3
device = "eno1"
format = " {$icon  $ip|󰛵  Cheking IP...} "
inactive_format = "  󰅛 "

[[block]]
block = "sound"
driver = "auto"
format = "  $icon  {$volume|}"

[[block.click]]
button = "right"
cmd = "alacritty -e pulsemixer"

[[block.click]]
button = "left"
cmd = "wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle"

[[block]]
block = "custom"
cycle = ["sh ~/.config/i3/status/custom_status.sh --type=date", "sh ~/.config/i3/status/custom_status.sh --type=time"]

[[block.click]]
button = "left"
action = "cycle"

[[block.click]]
button = "right"
cmd = "sh ~/.files/resources/scripts/calendar.sh"

[[block]]
block = "menu"
text = "  ⏻  "

[[block.items]]
display = "  ⏻  Performance  "
cmd = "powerprofilesctl set performance"

[[block.items]]
display = "  ⏻  Balanced  "
cmd = "powerprofilesctl set balanced"

[[block.items]]
display = "  ⏻  Minimal  "
cmd = "powerprofilesctl set power-saver"
