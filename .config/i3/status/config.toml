icons_format = "<span font_family='EnvyCodeR Nerd' size='12pt'>{icon}</span>"

[theme.overrides]
idle_bg = "#191236"
idle_fg = "#c5c3cc"
info_bg = "#c5c3cc"
info_fg = "#191236"
good_bg = "#B765A9"
good_fg = "#191236"
warning_bg = "#9A6FE3"
warning_fg = "#191236"
critical_bg = "#6165D6"
critical_fg = "#191236"
alternating_tint_bg = "#191236"
alternating_tint_fg = "#191236"
separator = "<span size='16pt'> </span>"
separator_bg = "auto"
separator_fg = "auto"

[icons]
icons = "none"

[icons.overrides]
cpu = "  "
cpu_boost_on = ""
cpu_boost_off = ""
memory_mem = "  "
memory_swap = " 󰋊 "
volume = ["󰕿", "󰖀", "󰕾"]
volume_muted = " 󰝟"
microphone = ["", "", ""]
microphone_muted = ""
headphones = ""
webcam = ""
net_wired = " 󰱓"
net_loopback = ""
net_modem = ""

[[block]]
block = "cpu"
interval = 2
info_cpu = 20
warning_cpu = 50
critical_cpu = 90
format = " $icon $utilization "

[[block.click]]
button = "right"
cmd = "alacritty -e btop"

[[block]]
block = "memory"
format = "  $icon $mem_used_percents.eng(w:1) "
format_alt = "  $icon_swap $swap_used_percents.eng(w:2) "

[[block]]
block = "custom"
interval = 0.5
command = "sh ~/.config/i3/status/custom_status.sh --type=bluetooth"

[[block.click]]
button = "left"
cmd = "sh ~/.config/i3/status/custom_status.sh --type=bluetooth toggle"

[[block.click]]
button = "right"
cmd = "bash ~/.config/rofi/scripts/bluetooth.sh"

[[block]]
block = "custom"
interval = 2
command = "sh ~/.config/i3/status/custom_status.sh --type=wifi"

[[block.click]]
button = "right"
cmd = "bash ~/.config/rofi/scripts/wifi.sh"

[[block]]
block = "net"
interval = 3
device = "eno1"
format = " {$icon  $ip|󰛵  Cheking IP...} "
inactive_format = "  󰅛 "

[[block]]
block = "sound"
driver = "auto"
format = "  $icon  {$volume|}"

[[block.click]]
button = "right"
cmd = "alacritty -e pulsemixer"

[[block.click]]
button = "left"
cmd = "wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle"

[[block]]
block = "custom"
cycle = ["sh ~/.config/i3/status/custom_status.sh --type=date", "sh ~/.config/i3/status/custom_status.sh --type=time"]

[[block.click]]
button = "left"
action = "cycle"

[[block]]
block = "menu"
text = "  ⏻  "

[[block.items]]
display = "  ⏻  Sleep  "
cmd = "systemctl suspend"

[[block.items]]
display = "  ⏻  Poweroff  "
cmd = "systemctl poweroff"

[[block.items]]
display = "  ⏻  Reboot  "
cmd = "systemctl reboot"
