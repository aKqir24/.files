icons_format = "<span font_family='EnvyCodeR Nerd Font Propo' size='12pt'>{icon}</span>"

[theme.overrides]
idle_bg = "#1f2643"
idle_fg = "#c7c8d0"
info_bg = "#c7c8d0"
info_fg = "#1f2643"
good_bg = "#BEA7B1"
good_fg = "#1f2643"
warning_bg = "#ECA3B1"
warning_fg = "#1f2643"
critical_bg = "#6DD699"
critical_fg = "#1f2643"
alternating_tint_bg = "#1f2643"
alternating_tint_fg = "#1f2643"
separator = "<span size='20pt'> </span>"
separator_bg = "auto"
separator_fg = "auto"

[icons]
icons = "none"

[icons.overrides]
cpu = " ΎΤ╝ "
cpu_boost_on = "Όι╖"
cpu_boost_off = "Όι╢"
memory_mem = " Ό┐Ζ "
memory_swap = " ≤░ΜΛ "
volume = ["≤░Χ┐", "≤░ΨΑ", "≤░Χ╛"]
volume_muted = " ≤░ζθ"
microphone = ["ΌΑς", "ΌΑσ", "ΌΑσ"]
microphone_muted = "ΌΑτ"
headphones = "ΌαΠ"
webcam = "ΌΒΜ"
net_wired = " ≤░▒Υ"
net_loopback = "ΌΑρ"
net_modem = "Ό┐ο"

[[block]]
block = "cpu"
interval = 2
info_cpu = 20
warning_cpu = 50
critical_cpu = 90
format = "  $icon $utilization "

[[block.click]]
button = "right"
cmd = "sh ~/.config/i3/status/custom_status.sh --type=monitor system"

[[block]]
block = "memory"
format = "  $icon $mem_used_percents.eng(w:1) "
format_alt = "   $icon_swap$swap_used_percents.eng(w:2)  "

[[block]]
block = "custom"
interval = 0.5
command = "sh ~/.config/i3/status/custom_status.sh --type=bluetooth"

[[block.click]]
button = "left"
cmd = "sh ~/.config/i3/status/custom_status.sh --type=bluetooth toggle"

[[block.click]]
button = "right"
cmd = "bash ~/.config/rofi/scripts/show.sh bluetooth"

[[block.click]]
button = "middle"
cmd = "bash ~/.config/i3/status/custom_status.sh --type=monitor bluetooth"

[[block]]
block = "custom"
interval = 2
command = "sh ~/.config/i3/status/custom_status.sh --type=wifi"

[[block.click]]
button = "right"
cmd = "bash ~/.config/rofi/scripts/show.sh wifi"

[[block]]
block = "net"
interval = 3
device = "eno1"
format = "  {<span size='5pt'> </span>$icon  <span rise='1000'>$ip</span>|≤░δ╡  Cheking IP...}  "
inactive_format = "   ≤░Ζδ  "

[[block]]
block = "sound"
driver = "auto"
format = "   $icon  {<span rise='-100'>$volume</span>|} "

[[block.click]]
button = "right"
cmd = "sh ~/.config/i3/status/custom_status.sh --type=monitor audio"

[[block.click]]
button = "left"
cmd = "wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle"

[[block]]
block = "custom"
cycle = ["sh ~/.config/i3/status/custom_status.sh --type=date", "sh ~/.config/i3/status/custom_status.sh --type=time"]

[[block.click]]
button = "left"
action = "cycle"

[[block.click]]
button = "right"
cmd = "sh ~/.files/resources/scripts/calendar.sh"

[[block]]
block = "custom"
interval = 2
command = "sh ~/.config/i3/status/custom_status.sh --type=monitor"

[[block.click]]
button = "left"
cmd = "bash ~/.config/i3/status/custom_status.sh --type=monitor screen"

[[block]]
block = "menu"
text = "  έΠ╗  "

[[block.items]]
display = "  έΠ╗  Performance  "
cmd = "powerprofilesctl set performance && notify-send 'Power Profile' 'Setting to performance...'"

[[block.items]]
display = "  έΠ╗  Balanced  "
cmd = "powerprofilesctl set balanced && notify-send 'Power Profile' 'Setting to balanced...'"

[[block.items]]
display = "  έΠ╗  Minimal  "
cmd = "powerprofilesctl set power-saver && notify-send 'Power Profile' 'Setting to power-saver...'"
